<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm Profile</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="bg-white text-gray-800 font-sans">
    <!-- Navigation -->
    <nav class="flex items-center justify-between px-8 py-4 border-b">
      <!-- Left side: logo or main nav -->
   <div class="text-green-800 font-semibold text-sm"> <a href="index.html" class="hover:text-green-800"
          >Farm Page</div>

      <!-- Right side: nav links and sign in -->
      <div class="flex items-center space-x-6 text-sm font-medium">
        <a href="farmprofilesmain.html" class="hover:text-green-800"
          >Farm Profiles</a
        >     <a href="#" class="hover:text-green-800">Resources</a>
        <a href="signup.html">
          <button class="px-4 py-1 text-white bg-green-800 rounded">
            Sign Up
          </button></a
        >
      </div>
    </nav>

    <!-- Farm Info -->
    <main class="max-w-4xl mx-auto px-6 py-10 bg-white mt-8 rounded-lg shadow">
      <h1 id="farm-name" class="text-3xl font-bold text-green-800 mb-2">
        Loading...
      </h1>
      <button class="message-btn">Message</button>
      <img id="farm-logo" src="" alt="Farm Image" />
      <div class="about-us p-6 shadow">
        <h3>About Us</h3>
        <p id="farm-description" class="text-gray-600"></p>
        <br />

        <div class="flex-layout">
          <div class="left-column">
            <h3>Products</h3>
            <p id="farm-products" class="text-gray-600 mb-4"></p>
            <div class="flex-gallery">
              <h3>Gallery</h3>
              <div class="relative overflow-hidden rounded-lg shadow-lg">
                <img id="farm-gallery" src="" alt="Gallery Image" />
              </div>
            </div>
          </div>

          <div class="right-column">
            <h3>Open Hours</h3>
            <p id="farm-hours" class="text-gray-600 mb-4"></p>
            <div class="flex-contact">
              <h3>Contact</h3>
              <p id="farm-location" class="text-gray-700 mb-1"></p>
              <p>
                <a id="farm-website" href="#" target="_blank">Visit Website</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="bg-green-100 text-gray-700 mt-12 border-t border-gray-300">
      <div
        class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 md:grid-cols-3 gap-8 text-sm"
      >
        <!-- About -->
        <div>
          <h4 class="text-green-800 font-semibold mb-2">About</h4>
          <p>
            Connecting you with local farms in the Peace Region of BC. Fresh,
            local, and sustainable.
          </p>
          <p
            class="text-center text-xs text-gray-500 py-4 border-t border-gray-200"
          >
            © 2025 Peace Farms. All rights reserved.
          </p>
        </div>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
